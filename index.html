<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meanwhile Deck</title>
<style>
  :root {
    --cream: #F5F0E8;
    --ink: #1A1A18;
    --warm-gray: #8C8880;
    --accent: #C4622D;
    --card-bg: #FDFAF4;
    --card-border: #D9D3C7;
    --shadow: rgba(26,26,24,0.12);
    --suit-bread: #C4622D;
    --suit-smoke: #6B7280;
    --suit-pond: #2E6B8A;
    --suit-feather: #5B7A4E;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header { text-align: center; padding: 64px 24px 40px; }

  .site-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 16px;
  }

  h1 {
    font-family: Georgia,'Times New Roman',serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .site-tagline {
    font-size: 12px;
    color: var(--warm-gray);
    letter-spacing: 0.05em;
    font-style: italic;
    max-width: 360px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .divider { width: 48px; height: 1px; background: var(--card-border); margin: 32px auto; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 0 24px;
    max-width: 700px;
    margin: 0 auto;
  }

  .btn {
    font-family:'Courier New',Courier,monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    padding: 12px 22px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    text-decoration: none;
    display: inline-block;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateY(100%);
    transition: transform 0.18s ease;
    z-index: -1;
  }

  .btn:hover { color: var(--cream); }
  .btn:hover::after { transform: translateY(0); }
  .btn:active { transform: scale(0.97); }

  .btn.primary { background: var(--ink); color: var(--cream); }
  .btn.primary::after { display: none; }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  .btn.muted { border-color: var(--warm-gray); color: var(--warm-gray); }
  .btn.muted::after { background: var(--warm-gray); }

  #reading-area {
    min-height: 360px;
    padding: 48px 24px 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* SHUFFLE */
  .shuffle-wrapper { display: flex; justify-content: center; align-items: center; min-height: 280px; }
  .shuffle-cards { position: relative; width: 120px; height: 200px; }
  .shuffle-card {
    position: absolute; width: 120px; height: 200px;
    background: var(--ink); border-radius: 10px;
    border: 1.5px solid var(--card-border);
    animation: shuf 0.5s ease-in-out infinite alternate;
  }
  .shuffle-card:nth-child(1) { animation-delay: 0s; }
  .shuffle-card:nth-child(2) { animation-delay: 0.08s; }
  .shuffle-card:nth-child(3) { animation-delay: 0.16s; }
  .shuffle-card:nth-child(4) { animation-delay: 0.24s; }
  .shuffle-card:nth-child(5) { animation-delay: 0.32s; }
  .shuffle-card::after { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; }
  @keyframes shuf {
    0% { transform: rotate(-8deg) translateX(-20px) translateY(0); }
    100% { transform: rotate(8deg) translateX(20px) translateY(-8px); }
  }
  .shuffle-label {
    text-align: center; margin-top: 24px; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* CARDS */
  .cards-container {
    display: flex; flex-wrap: wrap; gap: 28px;
    justify-content: center; animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); }

  /* Single card draw: wide and tall */
  .cards-container.single .card-flip-wrapper { width: min(88vw, 340px); height: min(132vw, 520px); }
  /* Spread: three cards side by side, smaller */
  .cards-container.spread .card-flip-wrapper { width: min(26vw, 200px); height: min(42vw, 320px); }

  .card-flip-wrapper { perspective: 1200px; }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4,0.2,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-slot:nth-child(1) .card-inner { transition-delay: 0s; }
  .card-slot:nth-child(2) .card-inner { transition-delay: 0.15s; }
  .card-slot:nth-child(3) .card-inner { transition-delay: 0.3s; }

  .card-face, .card-back {
    position: absolute; inset: 0; border-radius: 14px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }

  .card-back {
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 48px var(--shadow), 0 2px 8px var(--shadow);
  }
  .card-back-ring { position: absolute; inset: 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; }
  .card-back-ring2 { position: absolute; inset: 22px; border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; }
  .card-back-duck { font-size: 40px; opacity: 0.12; position: relative; z-index: 1; }

  .card-face {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
    padding: 20px 18px;
    box-shadow: 0 12px 48px var(--shadow), 0 2px 8px var(--shadow);
    overflow: hidden;
  }
  .card-face::before {
    content: ''; position: absolute; inset: 10px;
    border: 1px solid rgba(0,0,0,0.06); border-radius: 6px; pointer-events: none;
  }

  /* suit top accent */
  .card-face.s-major  { border-top: 4px solid var(--ink); }
  .card-face.s-bread  { border-top: 4px solid var(--suit-bread); }
  .card-face.s-smoke  { border-top: 4px solid var(--suit-smoke); }
  .card-face.s-pond   { border-top: 4px solid var(--suit-pond); }
  .card-face.s-feather{ border-top: 4px solid var(--suit-feather); }

  .card-top-row { display: flex; justify-content: space-between; margin-bottom: 6px; position: relative; z-index: 1; }
  .card-number { font-size: 11px; letter-spacing: 0.12em; color: var(--warm-gray); }
  .card-suit-icon { font-size: 14px; opacity: 0.7; }
  .card-symbol { font-size: 52px; text-align: center; margin: 10px 0 12px; line-height: 1; position: relative; z-index: 1; }
  .card-name { font-family:Georgia,'Times New Roman',serif; font-size: 1.35rem; text-align: center; color: var(--ink); margin-bottom: 8px; line-height: 1.2; position: relative; z-index: 1; }
  .card-keywords { font-size: 10px; text-align: center; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; line-height: 1.7; position: relative; z-index: 1; }
  .card-meaning { font-size: 12px; line-height: 1.7; color: var(--warm-gray); text-align: center; letter-spacing: 0.01em; flex: 1; position: relative; z-index: 1; }
  .card-upright { font-size: 11px; text-align: center; color: var(--ink); opacity: 0.55; margin-top: 12px; border-top: 1px solid var(--card-border); padding-top: 10px; line-height: 1.6; position: relative; z-index: 1; }

  /* Spread cards scale down text slightly */
  .cards-container.spread .card-symbol { font-size: 32px; margin: 6px 0 8px; }
  .cards-container.spread .card-name { font-size: 0.95rem; margin-bottom: 5px; }
  .cards-container.spread .card-keywords { font-size: 7px; margin-bottom: 6px; }
  .cards-container.spread .card-meaning { font-size: 8px; line-height: 1.55; }
  .cards-container.spread .card-upright { font-size: 7.5px; padding-top: 7px; margin-top: 8px; }
  .cards-container.spread .card-face { padding: 12px 10px; }
  .cards-container.spread .card-back-duck { font-size: 24px; }

  .daily-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--ink); color: var(--cream); padding: 3px 8px; border-radius: 2px; }
  .reversed-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--accent); color: var(--cream); padding: 3px 8px; border-radius: 2px; display: inline-block; }
  .card-inner.reversed .card-face { transform: rotateY(180deg) rotate(180deg); }
  .card-upright.is-reversed { color: var(--accent); opacity: 0.85; }
  .share-area { text-align: center; margin-top: 40px; animation: fadeUp 0.4s ease 0.3s both; }

  /* READING SUMMARY */
  .reading-summary {
    max-width: 560px;
    margin: 36px auto 0;
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    padding: 28px 28px 24px;
    animation: fadeUp 0.5s ease;
    text-align: center;
  }
  .rs-label {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 16px;
  }
  .rs-cards-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .rs-card-pill {
    font-size: 10px;
    letter-spacing: 0.08em;
    border: 1px solid var(--card-border);
    border-radius: 2px;
    padding: 4px 10px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .rs-card-pill.rev { border-color: var(--accent); color: var(--accent); }
  .rs-hr { width: 32px; height: 1px; background: var(--card-border); margin: 0 auto 18px; }
  .rs-text {
    font-size: 13px;
    line-height: 1.85;
    color: var(--ink);
    font-family: Georgia,'Times New Roman',serif;
    font-style: italic;
  }
  .rs-loading {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-gray);
    animation: blink 1s step-end infinite;
    padding: 12px 0;
  }

  /* CARD FLIP CURSOR */
  .card-flip-wrapper { cursor: default; }
  .card-flip-wrapper.flipped-done { cursor: pointer; }
  .card-flip-wrapper.flipped-done:hover .card-inner { filter: brightness(0.97); }

  /* DESCRIPTION PANEL — shown below card after flip */
  .card-desc-panel {
    display: none;
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    padding: 20px;
    max-width: min(88vw, 340px);
    width: 100%;
    animation: fadeUp 0.4s ease;
    text-align: center;
  }
  .card-desc-panel.visible { display: block; }

  .cdp-badges { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; min-height: 0; }
  .cdp-badges:empty { display: none; }
  .cdp-name { font-family: Georgia,'Times New Roman',serif; font-size: 1.3rem; color: var(--ink); margin-bottom: 4px; }
  .cdp-suit { font-size: 10px; letter-spacing: 0.12em; color: var(--warm-gray); text-transform: uppercase; margin-bottom: 10px; }
  .cdp-keywords { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); line-height: 1.7; margin-bottom: 12px; }
  .cdp-hr { width: 32px; height: 1px; background: var(--card-border); margin: 0 auto 14px; }
  .cdp-meaning { font-size: 13px; line-height: 1.75; color: var(--ink); margin-bottom: 16px; }
  .cdp-section { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .cdp-section-muted { color: var(--warm-gray); margin-top: 14px; }
  .cdp-text { font-size: 12px; line-height: 1.65; color: var(--ink); margin-bottom: 4px; }
  .cdp-muted { color: var(--warm-gray); opacity: 0.6; font-style: italic; }

  /* spread cards: no desc panel (tap to open modal instead) */
  .cards-container.spread .card-desc-panel { display: none !important; }
  .cards-container.spread .tap-hint { display: block; }
  .tap-hint { display: none; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); margin-top: 4px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 24px; color: var(--warm-gray); }
  .empty-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 12px; line-height: 1.8; letter-spacing: 0.05em; max-width: 300px; margin: 0 auto; }

  /* BROWSE */
  #browse-area { display: none; padding: 40px 24px 80px; max-width: 1100px; margin: 0 auto; animation: fadeUp 0.4s ease; }
  #browse-area.visible { display: block; }

  .browse-controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 32px; }

  .filter-btn {
    font-family:'Courier New',Courier,monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; border: 1px solid var(--card-border);
    background: transparent; color: var(--warm-gray); padding: 7px 14px;
    cursor: pointer; border-radius: 2px; transition: all 0.15s ease;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .filter-btn.fb.active { background: var(--suit-bread); border-color: var(--suit-bread); }
  .filter-btn.fs.active { background: var(--suit-smoke); border-color: var(--suit-smoke); }
  .filter-btn.fp.active { background: var(--suit-pond); border-color: var(--suit-pond); }
  .filter-btn.ff.active { background: var(--suit-feather); border-color: var(--suit-feather); }

  .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }

  .browse-card {
    background: var(--card-bg); border: 1.5px solid var(--card-border);
    border-radius: 8px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.15s ease;
  }
  .browse-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px var(--shadow); border-color: var(--ink); }
  .browse-card.s-major  { border-top: 2px solid var(--ink); }
  .browse-card.s-bread  { border-top: 2px solid var(--suit-bread); }
  .browse-card.s-smoke  { border-top: 2px solid var(--suit-smoke); }
  .browse-card.s-pond   { border-top: 2px solid var(--suit-pond); }
  .browse-card.s-feather{ border-top: 2px solid var(--suit-feather); }

  .bc-num { font-size: 8px; letter-spacing: 0.1em; color: var(--warm-gray); margin-bottom: 6px; }
  .bc-sym { font-size: 26px; margin-bottom: 8px; }
  .bc-name { font-family:Georgia,'Times New Roman',serif; font-size: 0.8rem; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
  .bc-kw { font-size: 7.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); line-height: 1.5; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,24,0.7); z-index: 500;
    align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg); border: 1.5px solid var(--card-border);
    border-radius: 12px; max-width: 480px; width: 100%;
    padding: 32px; position: relative; max-height: 90vh;
    overflow-y: auto; animation: fadeUp 0.25s ease;
  }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--warm-gray); font-family:'Courier New',Courier,monospace; }
  .modal-close:hover { color: var(--ink); }
  .modal-suit { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 4px; }
  .modal-symbol { font-size: 52px; margin: 12px 0; text-align: center; }
  .modal-name { font-family:Georgia,'Times New Roman',serif; font-size: 1.8rem; text-align: center; margin-bottom: 4px; line-height: 1.2; }
  .modal-sub { text-align: center; font-size: 10px; letter-spacing: 0.15em; color: var(--warm-gray); margin-bottom: 16px; }
  .modal-kw { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 16px; line-height: 1.7; }
  .modal-hr { width: 32px; height: 1px; background: var(--card-border); margin: 16px auto; }
  .modal-meaning { font-size: 13px; line-height: 1.75; color: var(--ink); text-align: center; margin-bottom: 20px; }
  .modal-lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 6px; margin-top: 16px; }
  .modal-ur, .modal-rv { font-size: 12px; line-height: 1.65; color: var(--ink); opacity: 0.75; }

  /* FOOTER */
  footer { text-align: center; padding: 40px 24px; border-top: 1px solid var(--card-border); margin-top: 40px; }
  .footer-text { font-size: 10px; letter-spacing: 0.1em; color: var(--warm-gray); line-height: 2; }

  @media (max-width: 520px) {
    header { padding: 48px 20px 32px; }
    .cards-container.spread .card-flip-wrapper { width: min(28vw, 160px); height: min(45vw, 256px); }
    .modal { padding: 24px 20px; }
    .browse-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <p class="site-eyebrow">78 cards · A deadpan oracle</p>
  <h1>The Meanwhile<br>Deck</h1>
  <p style="text-align:center;font-size:22px;margin:8px 0;opacity:0.3">🦆</p>
  <p class="site-tagline">Draw a card. Receive ambiguous guidance.<br>Continue existing.</p>
</header>

<div class="divider"></div>

<div class="controls">
  <button class="btn primary" onclick="drawOne()">Draw One Card</button>
  <button class="btn" onclick="drawSpread()">Three Card Spread</button>
  <button class="btn" onclick="drawDaily()">Daily Card</button>
  <button class="btn muted" id="browse-toggle-btn" onclick="toggleBrowse()">Browse All 78 ↓</button>
</div>

<div id="reading-area">
  <div class="empty-state">
    <div class="empty-icon">🦆</div>
    <p>The deck waits.<br>Patiently. With mild indifference.</p>
  </div>
</div>

<div id="browse-area">
  <div class="browse-controls">
    <button class="filter-btn active" onclick="filterDeck('all',this)">All 78</button>
    <button class="filter-btn" onclick="filterDeck('major',this)">Major Arcana</button>
    <button class="filter-btn fb" onclick="filterDeck('bread',this)">🥖 Bread</button>
    <button class="filter-btn fs" onclick="filterDeck('smoke',this)">🚬 Smoke</button>
    <button class="filter-btn fp" onclick="filterDeck('pond',this)">🌊 Pond</button>
    <button class="filter-btn ff" onclick="filterDeck('feather',this)">🪶 Feather</button>
  </div>
  <div class="browse-grid" id="browse-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p class="footer-text">
    The Meanwhile Deck · Duckzzy Tarot · 78 cards<br>
    All readings are ambiguous. All ambiguity is correct.
  </p>
  <p class="footer-text" style="margin-top:12px">
    <a href="https://mallow.art/collection/46g2516XjcN6gysJtQNE7MEmRPaHpPYYRrJ95eQohCvg" target="_blank" rel="noopener" style="color:var(--warm-gray);text-decoration:none;border-bottom:1px solid var(--card-border);letter-spacing:0.1em;font-size:10px;text-transform:uppercase;transition:color 0.15s ease;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--warm-gray)'">🦆 Own a card · Mallow.art ↗</a>
  </p>
</footer>

<script>
const SUIT_LABEL = { major:'Major Arcana', bread:'🥖 Suit of Bread', smoke:'🚬 Suit of Smoke', pond:'🌊 Suit of Pond', feather:'🪶 Suit of Feather' };
const SUIT_ICON  = { major:'✦', bread:'🥖', smoke:'🚬', pond:'🌊', feather:'🪶' };

const DECK = [

// ─── helpers ───────────────────────────────────
function getRandom(exclude=[]) {
  const pool = DECK.filter(c=>!exclude.includes(c.id));
  return pool[Math.floor(Math.random()*pool.length)];
}
function getDaily() {
  const d = new Date();
  // mix year, month, day so the result spreads across all 78 cards
  const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
  const seed = (y * 31 + m) * 31 + day;
  return DECK[seed % DECK.length];
}
// 50/50 chance of reversed — daily card is always upright
function isReversed() { return Math.random() < 0.5; }

// ─── card builder ──────────────────────────────
function cardHTML(card, label=null, isDaily=false, rev=false) {
  const uid = card.id+'-'+Math.random().toString(36).slice(2,7);
  const revClass = rev ? ' reversed' : '';
  const orientLabel = rev ? 'Reversed' : 'Upright';
  const orientText  = rev ? card.reversed : card.upright;
  const revStyle    = rev ? ' is-reversed' : '';
  const accentColor = rev ? 'var(--accent)' : 'var(--ink)';
  return `
    <div class="card-slot">
      ${label?`<span class="card-label">${label}</span>`:''}
      <div class="card-flip-wrapper" onclick="onCardClick(this, ${card.id}, ${rev})">
        <div class="card-inner${revClass}" id="ci-${uid}">
          <div class="card-back">
            <div class="card-back-ring"></div>
            <div class="card-back-ring2"></div>
            <span class="card-back-duck">🦆</span>
          </div>
          <div class="card-face s-${card.suit}">
            <div class="card-top-row">
              <span class="card-number">${card.number}</span>
              <span class="card-suit-icon">${SUIT_ICON[card.suit]}</span>
            </div>
            <div class="card-symbol">${card.symbol}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-keywords">${card.keywords}</div>
          </div>
        </div>
      </div>
      <div class="card-desc-panel" id="desc-${uid}">
        <div class="cdp-badges">
          ${isDaily?`<span class="daily-badge">Today's Card</span>`:''}
          ${rev?`<span class="reversed-badge">Reversed</span>`:''}
        </div>
        <div class="cdp-name">${card.symbol} ${card.name}</div>
        <div class="cdp-suit">${SUIT_LABEL[card.suit]} · ${card.number}${card.altName?' · '+card.altName:''}</div>
        <div class="cdp-keywords">${card.keywords}</div>
        <div class="cdp-hr"></div>
        <div class="cdp-meaning">${card.meaning}</div>
        <div class="cdp-section" style="color:${accentColor}">${orientLabel}</div>
        <div class="cdp-text">${orientText}</div>
        <div class="cdp-section cdp-section-muted">Also known as reversed:</div>
        <div class="cdp-text cdp-muted">${rev ? card.upright : card.reversed}</div>
      </div>
      <span class="tap-hint">Tap card for full reading</span>
    </div>`;
}

function onCardClick(wrapper, cardId, rev) {
  // if card not yet flipped, do nothing (let flipAll handle it)
  const inner = wrapper.querySelector('.card-inner');
  if (!inner.classList.contains('flipped')) return;
  // otherwise open modal
  openDrawnModal(cardId, rev);
}

function openDrawnModal(cardId, rev) {
  const c = DECK.find(x=>x.id===cardId); if(!c) return;
  const orientLabel = rev ? 'Reversed' : 'Upright';
  const orientText  = rev ? c.reversed : c.upright;
  const otherLabel  = rev ? 'Upright (for reference)' : 'Reversed (for reference)';
  const otherText   = rev ? c.upright : c.reversed;
  const accentColor = rev ? 'var(--accent)' : 'inherit';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-suit">${SUIT_LABEL[c.suit]}${rev?' · <span style="color:var(--accent)">Reversed</span>':''}</div>
    <div class="modal-symbol" style="${rev?'transform:rotate(180deg);display:block':''}">${c.symbol}</div>
    <div class="modal-name">${c.name}</div>
    <div class="modal-sub">${c.number}${c.altName?' · '+c.altName:''}</div>
    <div class="modal-kw">${c.keywords}</div>
    <div class="modal-hr"></div>
    <div class="modal-meaning">${c.meaning}</div>
    <div class="modal-lbl" style="color:${accentColor}">${orientLabel}</div>
    <div class="modal-ur" style="color:${accentColor};opacity:1;font-weight:500">${orientText}</div>
    <div class="modal-lbl" style="margin-top:20px">${otherLabel}</div>
    <div class="modal-rv">${otherText}</div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function shareBtn(cards, revs) {
  return `<div class="share-area" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
    <button class="btn muted" id="share-img-btn" style="opacity:0.45;pointer-events:none;cursor:default">Preparing image…</button>
    <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('My Meanwhile Deck reading 🦆 qinugroho.github.io/The-Meanwhile-Deck/')}" id="share-x-btn" target="_blank" rel="noopener" class="btn muted" style="opacity:0.45;pointer-events:none;cursor:default">Share on X ↗</a>
  </div>`;
}

// ─── canvas image generator ────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let currentY = y;
  for (let i = 0; i < words.length; i++) {
    const testLine = line + words[i] + ' ';
    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
      ctx.fillText(line.trim(), x, currentY);
      line = words[i] + ' ';
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line.trim(), x, currentY);
  return currentY;
}

function downloadReadingImage() {
  const summaryEl = document.getElementById('rs-text');
  if (!summaryEl || summaryEl.classList.contains('rs-loading')) return;
  const summaryText = summaryEl.textContent;

  // use stored reading state
  const cards = window._lastCards || [];
  const revs  = window._lastRevs  || [];
  const labels = window._lastLabels || [];

  // collect pill display text
  const pills = document.querySelectorAll('.rs-card-pill');
  const cardLines = Array.from(pills).map(p => p.textContent.trim().replace(/\s+/g,' '));

  const SCALE = 2; // retina
  const W = 720, H = 960;
  const canvas = document.createElement('canvas');
  canvas.width = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);

  const PAD = 48;
  const CARD_X = PAD;
  const CARD_Y = PAD;
  const CARD_W = W - PAD * 2;
  const CARD_H = H - PAD * 2;
  const R = 16; // border radius

  // page background
  ctx.fillStyle = '#EDEAE2';
  ctx.fillRect(0, 0, W, H);

  // card shadow
  ctx.save();
  ctx.shadowColor = 'rgba(26,26,24,0.13)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 8;
  ctx.fillStyle = '#FDFAF4';
  ctx.beginPath();
  ctx.roundRect(CARD_X, CARD_Y, CARD_W, CARD_H, R);
  ctx.fill();
  ctx.restore();

  // card bg
  ctx.fillStyle = '#FDFAF4';
  ctx.beginPath();
  ctx.roundRect(CARD_X, CARD_Y, CARD_W, CARD_H, R);
  ctx.fill();

  // card border
  ctx.strokeStyle = '#D9D3C7';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(CARD_X, CARD_Y, CARD_W, CARD_H, R);
  ctx.stroke();

  // inner border inset
  ctx.strokeStyle = 'rgba(217,211,199,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(CARD_X + 10, CARD_Y + 10, CARD_W - 20, CARD_H - 20, R - 4);
  ctx.stroke();

  let curY = CARD_Y + 52;

  // top label  "🦆  THE DUCK OBSERVES"
  ctx.fillStyle = '#8C8880';
  ctx.font = '500 11px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🦆  THE DUCK OBSERVES', W / 2, curY);
  curY += 36;

  // pills — stacked vertically like in the UI
  const PILL_H = 34;
  const PILL_PAD_X = 20;
  const SUIT_COLORS = { major:'#1A1A18', bread:'#C4622D', smoke:'#6B7280', pond:'#2E6B8A', feather:'#5B7A4E' };

  cardLines.forEach((line, i) => {
    const isRev = revs[i];
    const card = cards[i];
    const accentColor = isRev ? '#C4622D' : (SUIT_COLORS[card.suit] || '#1A1A18');

    ctx.font = '500 13px "Courier New", monospace';
    const textW = ctx.measureText(line).width;
    const pillW = Math.min(textW + PILL_PAD_X * 2, CARD_W - 80);
    const pillX = W / 2 - pillW / 2;

    // pill background
    ctx.fillStyle = '#FDFAF4';
    ctx.beginPath();
    ctx.roundRect(pillX, curY, pillW, PILL_H, 3);
    ctx.fill();

    // pill border — accent color for reversed, gray for upright
    ctx.strokeStyle = isRev ? '#C4622D' : '#D9D3C7';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(pillX, curY, pillW, PILL_H, 3);
    ctx.stroke();

    // pill text
    ctx.fillStyle = accentColor;
    ctx.font = '500 13px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(line, W / 2, curY + PILL_H / 2 + 5);

    curY += PILL_H + 10;
  });

  curY += 10;

  // divider
  ctx.strokeStyle = '#D9D3C7';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 32, curY);
  ctx.lineTo(W / 2 + 32, curY);
  ctx.stroke();
  curY += 36;

  // summary text — italic Georgia, centered, wrapped
  ctx.fillStyle = '#1A1A18';
  ctx.font = 'italic 21px Georgia, serif';
  ctx.textAlign = 'center';
  const maxTextW = CARD_W - 96;
  const lineH = 36;

  // manual word wrap
  const words = summaryText.split(' ');
  let line = '';
  const lines = [];
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxTextW && line !== '') {
      lines.push(line.trim());
      line = words[i] + ' ';
    } else {
      line = test;
    }
  }
  if (line.trim()) lines.push(line.trim());

  lines.forEach(l => {
    ctx.fillText(l, W / 2, curY);
    curY += lineH;
  });

  curY += 28;

  // bottom divider
  ctx.strokeStyle = '#D9D3C7';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 32, curY);
  ctx.lineTo(W / 2 + 32, curY);
  ctx.stroke();
  curY += 28;

  // bottom tag
  ctx.fillStyle = '#8C8880';
  ctx.font = '500 10px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('THE MEANWHILE DECK  ·  qinugroho.github.io/The-Meanwhile-Deck', W / 2, curY);

  // download
  const link = document.createElement('a');
  link.download = 'meanwhile-reading.png';
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// ─── reading summary ───────────────────────────
function buildSummaryHTML(cards, revs, labels) {
  const pillsHTML = cards.map((c, i) => {
    const isRev = revs[i];
    const lbl = labels ? labels[i] : null;
    return `<span class="rs-card-pill${isRev?' rev':''}">
      ${c.symbol} ${c.name}${isRev?' ↑↓':''}${lbl?` <span style="opacity:0.5;font-size:9px">· ${lbl}</span>`:''}
    </span>`;
  }).join('');

  return `<div class="reading-summary" id="reading-summary">
    <div class="rs-label">🦆 The Duck Observes</div>
    <div class="rs-cards-row">${pillsHTML}</div>
    <div class="rs-hr"></div>
    <div class="rs-text" id="rs-text"></div>
  </div>`;
}

function generateSummary(cards, revs, labels) {
  // connective phrases per position
  const connectors = {
    past:      ['In the past,', 'What came before:', 'Something already happened.'],
    present:   ['Currently,', 'At this moment,', 'The present holds this:'],
    meanwhile: ['Meanwhile,', 'Elsewhere,', 'At the same time,'],
    single:    ['The card is clear, yet unclear.', 'Something surfaces.', 'The deck has spoken, loosely.'],
  };

  // deadpan closing lines
  const closings = [
    'The duck observes. Continue existing.',
    'This is neither a warning nor a promise.',
    'Consider this. Or don\'t.',
    'The pond remains.',
    'Proceed accordingly, or don\'t proceed at all.',
    'Nothing more is required of you at this time.',
    'The meaning is yours to misinterpret.',
    'Something is happening. It may involve you.',
  ];

  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  let sentences = [];

  if (cards.length === 1) {
    const c = cards[0];
    const orient = revs[0] ? c.reversed : c.upright;
    sentences.push(pick(connectors.single));
    sentences.push(`${c.name} appears. ${c.meaning}`);
    sentences.push(orient);
  } else {
    const posKeys = ['past', 'present', 'meanwhile'];
    cards.forEach((c, i) => {
      const orient = revs[i] ? c.reversed : c.upright;
      const pos = posKeys[i] || 'meanwhile';
      const connector = pick(connectors[pos]);
      sentences.push(`${connector} ${c.name}. ${orient}`);
    });
  }

  sentences.push(pick(closings));

  const text = sentences.join(' ');

  // update UI — no loading needed, instant
  const el = document.getElementById('rs-text');
  if (el) {
    el.classList.remove('rs-loading');
    el.textContent = text;
  }

  // activate buttons immediately
  const imgBtn = document.getElementById('share-img-btn');
  if (imgBtn) {
    imgBtn.textContent = '↓ Save Reading Image';
    imgBtn.classList.remove('muted');
    imgBtn.style.opacity = '1';
    imgBtn.style.pointerEvents = 'auto';
    imgBtn.style.cursor = 'pointer';
    imgBtn.addEventListener('click', downloadReadingImage);
  }
  const shareEl = document.getElementById('share-x-btn');
  if (shareEl) {
    shareEl.classList.remove('muted');
    shareEl.style.opacity = '1';
    shareEl.style.pointerEvents = 'auto';
    shareEl.style.cursor = 'pointer';
  }
}


function showShuffle() {
  document.getElementById('reading-area').innerHTML = `
    <div class="shuffle-wrapper"><div>
      <div class="shuffle-cards">
        <div class="shuffle-card"></div><div class="shuffle-card"></div>
        <div class="shuffle-card"></div><div class="shuffle-card"></div>
        <div class="shuffle-card"></div>
      </div>
      <div class="shuffle-label">Shuffling</div>
    </div></div>`;
}

function flipAll() {
  const inners = document.querySelectorAll('.card-inner');
  inners.forEach((el,i)=>{
    setTimeout(()=>{
      el.classList.add('flipped');
      // after flip animation, show description panel and mark wrapper tappable
      setTimeout(()=>{
        el.closest('.card-flip-wrapper').classList.add('flipped-done');
        // find the sibling desc panel (next sibling of card-flip-wrapper's parent)
        const slot = el.closest('.card-slot');
        const panel = slot.querySelector('.card-desc-panel');
        if(panel) panel.classList.add('visible');
      }, 700);
    }, i*180);
  });
}

// ─── draw actions ──────────────────────────────
function drawOne() {
  hideBrowse();
  const c = getRandom();
  const rev = isReversed();
  showShuffle();
  setTimeout(()=>{
    window._lastCards = [c]; window._lastRevs = [rev]; window._lastLabels = [];
    const summaryHTML = buildSummaryHTML([c], [rev], null);
    document.getElementById('reading-area').innerHTML = `<div class="cards-container single">${cardHTML(c,null,false,rev)}</div>${shareBtn([c],[rev])}${summaryHTML}`;
    setTimeout(flipAll,60);
    setTimeout(()=> generateSummary([c],[rev],null), 1200);
  },900);
}

function drawSpread() {
  hideBrowse();
  const used=[], cards=[], revs=[];
  ['Past','Present','Meanwhile'].forEach(lbl=>{
    const c=getRandom(used); used.push(c.id);
    cards.push({card:c,lbl}); revs.push(isReversed());
  });
  showShuffle();
  setTimeout(()=>{
    const cardObjs = cards.map(x=>x.card);
    const lbls = cards.map(x=>x.lbl);
    window._lastCards = cardObjs; window._lastRevs = revs; window._lastLabels = lbls;
    const summaryHTML = buildSummaryHTML(cardObjs, revs, lbls);
    document.getElementById('reading-area').innerHTML = `<div class="cards-container spread">${cards.map(({card:c,lbl},i)=>cardHTML(c,lbl,false,revs[i])).join('')}</div>${shareBtn(cardObjs,revs)}${summaryHTML}`;
    setTimeout(flipAll,60);
    setTimeout(()=> generateSummary(cardObjs, revs, lbls), 1400);
  },1000);
}

function drawDaily() {
  hideBrowse();
  const c = getDaily();
  showShuffle();
  setTimeout(()=>{
    document.getElementById('reading-area').innerHTML = `<div class="cards-container single">${cardHTML(c,null,true,false)}</div>${shareBtn([c],[false])}`;
    setTimeout(flipAll,60);
  },700);
}

// ─── browse ────────────────────────────────────
let browseOpen=false;

function toggleBrowse() {
  browseOpen=!browseOpen;
  const area=document.getElementById('browse-area');
  const btn=document.getElementById('browse-toggle-btn');
  if(browseOpen) {
    area.classList.add('visible');
    renderBrowse('all');
    btn.textContent='Browse All 78 ↑';
    setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),50);
  } else {
    area.classList.remove('visible');
    btn.textContent='Browse All 78 ↓';
  }
}

function hideBrowse() {
  browseOpen=false;
  document.getElementById('browse-area').classList.remove('visible');
  document.getElementById('browse-toggle-btn').textContent='Browse All 78 ↓';
}

function filterDeck(f,btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowse(f);
}

function renderBrowse(f) {
  const list = f==='all' ? DECK : DECK.filter(c=>c.suit===f);
  document.getElementById('browse-grid').innerHTML = list.map(c=>`
    <div class="browse-card s-${c.suit}" onclick="openModal(${c.id})">
      <div class="bc-num">${c.number}</div>
      <div class="bc-sym">${c.symbol}</div>
      <div class="bc-name">${c.name}</div>
      <div class="bc-kw">${c.keywords.split(' · ')[0]}</div>
    </div>`).join('');
}

// ─── modal ─────────────────────────────────────
function openModal(id) {
  const c=DECK.find(x=>x.id===id); if(!c) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-suit">${SUIT_LABEL[c.suit]}</div>
    <div class="modal-symbol">${c.symbol}</div>
    <div class="modal-name">${c.name}</div>
    <div class="modal-sub">${c.number}${c.altName?' · '+c.altName:''}</div>
    <div class="modal-kw">${c.keywords}</div>
    <div class="modal-hr"></div>
    <div class="modal-meaning">${c.meaning}</div>
    <div class="modal-lbl">Upright</div>
    <div class="modal-ur">${c.upright}</div>
    <div class="modal-lbl">Reversed</div>
    <div class="modal-rv">${c.reversed}</div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e) {
  if(e && e.target!==document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>
