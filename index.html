<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meanwhile Deck</title>
<style>
  :root {
    --cream: #F5F0E8;
    --ink: #1A1A18;
    --warm-gray: #8C8880;
    --accent: #C4622D;
    --card-bg: #FDFAF4;
    --card-border: #D9D3C7;
    --shadow: rgba(26,26,24,0.12);
    --suit-bread: #C4622D;
    --suit-smoke: #6B7280;
    --suit-pond: #2E6B8A;
    --suit-feather: #5B7A4E;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header { text-align: center; padding: 64px 24px 40px; }

  .site-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 16px;
  }

  h1 {
    font-family: Georgia,'Times New Roman',serif;
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .site-tagline {
    font-size: 12px;
    color: var(--warm-gray);
    letter-spacing: 0.05em;
    font-style: italic;
    max-width: 360px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .divider { width: 48px; height: 1px; background: var(--card-border); margin: 32px auto; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 0 24px;
    max-width: 700px;
    margin: 0 auto;
  }

  .btn {
    font-family:'Courier New',Courier,monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    padding: 12px 22px;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    text-decoration: none;
    display: inline-block;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateY(100%);
    transition: transform 0.18s ease;
    z-index: -1;
  }

  .btn:hover { color: var(--cream); }
  .btn:hover::after { transform: translateY(0); }
  .btn:active { transform: scale(0.97); }

  .btn.primary { background: var(--ink); color: var(--cream); }
  .btn.primary::after { display: none; }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  .btn.muted { border-color: var(--warm-gray); color: var(--warm-gray); }
  .btn.muted::after { background: var(--warm-gray); }

  #reading-area {
    min-height: 360px;
    padding: 48px 24px 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* SHUFFLE */
  .shuffle-wrapper { display: flex; justify-content: center; align-items: center; min-height: 280px; }
  .shuffle-cards { position: relative; width: 120px; height: 200px; }
  .shuffle-card {
    position: absolute; width: 120px; height: 200px;
    background: var(--ink); border-radius: 10px;
    border: 1.5px solid var(--card-border);
    animation: shuf 0.5s ease-in-out infinite alternate;
  }
  .shuffle-card:nth-child(1) { animation-delay: 0s; }
  .shuffle-card:nth-child(2) { animation-delay: 0.08s; }
  .shuffle-card:nth-child(3) { animation-delay: 0.16s; }
  .shuffle-card:nth-child(4) { animation-delay: 0.24s; }
  .shuffle-card:nth-child(5) { animation-delay: 0.32s; }
  .shuffle-card::after { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; }
  @keyframes shuf {
    0% { transform: rotate(-8deg) translateX(-20px) translateY(0); }
    100% { transform: rotate(8deg) translateX(20px) translateY(-8px); }
  }
  .shuffle-label {
    text-align: center; margin-top: 24px; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* CARDS */
  .cards-container {
    display: flex; flex-wrap: wrap; gap: 24px;
    justify-content: center; animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-slot { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); }

  .card-flip-wrapper { width: 160px; height: 264px; perspective: 1000px; }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4,0.2,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-slot:nth-child(1) .card-inner { transition-delay: 0s; }
  .card-slot:nth-child(2) .card-inner { transition-delay: 0.15s; }
  .card-slot:nth-child(3) .card-inner { transition-delay: 0.3s; }

  .card-face, .card-back {
    position: absolute; inset: 0; border-radius: 10px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }

  .card-back {
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 8px var(--shadow);
  }
  .card-back-ring { position: absolute; inset: 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; }
  .card-back-ring2 { position: absolute; inset: 18px; border: 1px solid rgba(255,255,255,0.04); border-radius: 3px; }
  .card-back-duck { font-size: 28px; opacity: 0.12; position: relative; z-index: 1; }

  .card-face {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
    padding: 14px;
    box-shadow: 0 8px 32px var(--shadow), 0 2px 8px var(--shadow);
    overflow: hidden;
  }
  .card-face::before {
    content: ''; position: absolute; inset: 7px;
    border: 1px solid rgba(0,0,0,0.06); border-radius: 4px; pointer-events: none;
  }

  /* suit top accent */
  .card-face.s-major  { border-top: 3px solid var(--ink); }
  .card-face.s-bread  { border-top: 3px solid var(--suit-bread); }
  .card-face.s-smoke  { border-top: 3px solid var(--suit-smoke); }
  .card-face.s-pond   { border-top: 3px solid var(--suit-pond); }
  .card-face.s-feather{ border-top: 3px solid var(--suit-feather); }

  .card-top-row { display: flex; justify-content: space-between; margin-bottom: 4px; position: relative; z-index: 1; }
  .card-number { font-size: 9px; letter-spacing: 0.12em; color: var(--warm-gray); }
  .card-suit-icon { font-size: 11px; opacity: 0.7; }
  .card-symbol { font-size: 36px; text-align: center; margin: 8px 0; line-height: 1; position: relative; z-index: 1; }
  .card-name { font-family:Georgia,'Times New Roman',serif; font-size: 0.95rem; text-align: center; color: var(--ink); margin-bottom: 6px; line-height: 1.2; position: relative; z-index: 1; }
  .card-keywords { font-size: 7.5px; text-align: center; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; line-height: 1.6; position: relative; z-index: 1; }
  .card-meaning { font-size: 8.5px; line-height: 1.65; color: var(--warm-gray); text-align: center; letter-spacing: 0.02em; flex: 1; position: relative; z-index: 1; }
  .card-upright { font-size: 7.5px; text-align: center; color: var(--ink); opacity: 0.45; margin-top: 8px; border-top: 1px solid var(--card-border); padding-top: 7px; line-height: 1.5; position: relative; z-index: 1; }

  .daily-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--ink); color: var(--cream); padding: 3px 8px; border-radius: 2px; }
  .reversed-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--accent); color: var(--cream); padding: 3px 8px; border-radius: 2px; display: inline-block; }
  .card-inner.reversed .card-face { transform: rotateY(180deg) rotate(180deg); }
  .card-upright.is-reversed { color: var(--accent); opacity: 0.85; }
  .share-area { text-align: center; margin-top: 40px; animation: fadeUp 0.4s ease 0.3s both; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 24px; color: var(--warm-gray); }
  .empty-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 12px; line-height: 1.8; letter-spacing: 0.05em; max-width: 300px; margin: 0 auto; }

  /* BROWSE */
  #browse-area { display: none; padding: 40px 24px 80px; max-width: 1100px; margin: 0 auto; animation: fadeUp 0.4s ease; }
  #browse-area.visible { display: block; }

  .browse-controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 32px; }

  .filter-btn {
    font-family:'Courier New',Courier,monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; border: 1px solid var(--card-border);
    background: transparent; color: var(--warm-gray); padding: 7px 14px;
    cursor: pointer; border-radius: 2px; transition: all 0.15s ease;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .filter-btn.fb.active { background: var(--suit-bread); border-color: var(--suit-bread); }
  .filter-btn.fs.active { background: var(--suit-smoke); border-color: var(--suit-smoke); }
  .filter-btn.fp.active { background: var(--suit-pond); border-color: var(--suit-pond); }
  .filter-btn.ff.active { background: var(--suit-feather); border-color: var(--suit-feather); }

  .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }

  .browse-card {
    background: var(--card-bg); border: 1.5px solid var(--card-border);
    border-radius: 8px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.15s ease;
  }
  .browse-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px var(--shadow); border-color: var(--ink); }
  .browse-card.s-major  { border-top: 2px solid var(--ink); }
  .browse-card.s-bread  { border-top: 2px solid var(--suit-bread); }
  .browse-card.s-smoke  { border-top: 2px solid var(--suit-smoke); }
  .browse-card.s-pond   { border-top: 2px solid var(--suit-pond); }
  .browse-card.s-feather{ border-top: 2px solid var(--suit-feather); }

  .bc-num { font-size: 8px; letter-spacing: 0.1em; color: var(--warm-gray); margin-bottom: 6px; }
  .bc-sym { font-size: 26px; margin-bottom: 8px; }
  .bc-name { font-family:Georgia,'Times New Roman',serif; font-size: 0.8rem; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
  .bc-kw { font-size: 7.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); line-height: 1.5; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,24,0.7); z-index: 500;
    align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg); border: 1.5px solid var(--card-border);
    border-radius: 12px; max-width: 480px; width: 100%;
    padding: 32px; position: relative; max-height: 90vh;
    overflow-y: auto; animation: fadeUp 0.25s ease;
  }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--warm-gray); font-family:'Courier New',Courier,monospace; }
  .modal-close:hover { color: var(--ink); }
  .modal-suit { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 4px; }
  .modal-symbol { font-size: 52px; margin: 12px 0; text-align: center; }
  .modal-name { font-family:Georgia,'Times New Roman',serif; font-size: 1.8rem; text-align: center; margin-bottom: 4px; line-height: 1.2; }
  .modal-sub { text-align: center; font-size: 10px; letter-spacing: 0.15em; color: var(--warm-gray); margin-bottom: 16px; }
  .modal-kw { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 16px; line-height: 1.7; }
  .modal-hr { width: 32px; height: 1px; background: var(--card-border); margin: 16px auto; }
  .modal-meaning { font-size: 13px; line-height: 1.75; color: var(--ink); text-align: center; margin-bottom: 20px; }
  .modal-lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 6px; margin-top: 16px; }
  .modal-ur, .modal-rv { font-size: 12px; line-height: 1.65; color: var(--ink); opacity: 0.75; }

  /* FOOTER */
  footer { text-align: center; padding: 40px 24px; border-top: 1px solid var(--card-border); margin-top: 40px; }
  .footer-text { font-size: 10px; letter-spacing: 0.1em; color: var(--warm-gray); line-height: 2; }

  @media (max-width: 520px) {
    header { padding: 48px 20px 32px; }
    .card-flip-wrapper { width: 145px; height: 240px; }
    .card-symbol { font-size: 30px; }
    .cards-container { gap: 16px; }
    .browse-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .modal { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <p class="site-eyebrow">78 cards · A deadpan oracle</p>
  <h1>The Meanwhile<br>Deck</h1>
  <p style="text-align:center;font-size:22px;margin:8px 0;opacity:0.3">🦆</p>
  <p class="site-tagline">Draw a card. Receive ambiguous guidance.<br>Continue existing.</p>
</header>

<div class="divider"></div>

<div class="controls">
  <button class="btn primary" onclick="drawOne()">Draw One Card</button>
  <button class="btn" onclick="drawSpread()">Three Card Spread</button>
  <button class="btn" onclick="drawDaily()">Daily Card</button>
  <button class="btn muted" id="browse-toggle-btn" onclick="toggleBrowse()">Browse All 78 ↓</button>
</div>

<div id="reading-area">
  <div class="empty-state">
    <div class="empty-icon">🦆</div>
    <p>The deck waits.<br>Patiently. With mild indifference.</p>
  </div>
</div>

<div id="browse-area">
  <div class="browse-controls">
    <button class="filter-btn active" onclick="filterDeck('all',this)">All 78</button>
    <button class="filter-btn" onclick="filterDeck('major',this)">Major Arcana</button>
    <button class="filter-btn fb" onclick="filterDeck('bread',this)">🥖 Bread</button>
    <button class="filter-btn fs" onclick="filterDeck('smoke',this)">🚬 Smoke</button>
    <button class="filter-btn fp" onclick="filterDeck('pond',this)">🌊 Pond</button>
    <button class="filter-btn ff" onclick="filterDeck('feather',this)">🪶 Feather</button>
  </div>
  <div class="browse-grid" id="browse-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p class="footer-text">
    The Meanwhile Deck · Duckzzy Tarot · 78 cards<br>
    All readings are ambiguous. All ambiguity is correct.
  </p>
</footer>

<script>
const SUIT_LABEL = { major:'Major Arcana', bread:'🥖 Suit of Bread', smoke:'🚬 Suit of Smoke', pond:'🌊 Suit of Pond', feather:'🪶 Suit of Feather' };
const SUIT_ICON  = { major:'✦', bread:'🥖', smoke:'🚬', pond:'🌊', feather:'🪶' };

const DECK = [
  // ── MAJOR ARCANA ──
  {id:0,  suit:'major', number:'0',      symbol:'🐣', name:'The Duckling',    altName:'The Fool',           keywords:'Beginning · Innocence · Uncertainty · Step forward',    meaning:"Duckzzy walks without a plan, holding something not yet understood. There is movement before clarity. The path exists, even if Duckzzy hasn't noticed it yet.", upright:"A new phase begins without instructions. Curiosity matters more than confidence.", reversed:"Fear of starting. Waiting for certainty that will never fully arrive."},
  {id:1,  suit:'major', number:'I',      symbol:'✒️', name:'The Beak',         altName:'The Magician',       keywords:'Initiative · Expression · Attempt · Control',            meaning:"Duckzzy holds the beak as a tool. Something ordinary is treated as powerful. Action comes before mastery.", upright:"You can act with what you already have. Trying matters, even if it's clumsy.", reversed:"Misuse of ability. Doubting your own influence."},
  {id:2,  suit:'major', number:'II',     symbol:'👁️', name:'The Observer',     altName:'The High Priestess', keywords:'Intuition · Silence · Awareness · Observation',          meaning:"Duckzzy watches without reacting. Nothing is said, but everything is noticed. Knowing exists without explanation.", upright:"Trust quiet understanding. Wait before responding.", reversed:"Ignoring intuition. Filling silence with unnecessary action."},
  {id:3,  suit:'major', number:'III',    symbol:'🥖', name:'The Breadgiver',   altName:'The Empress',        keywords:'Comfort · Care · Abundance · Nurture',                   meaning:"Bread is offered freely. Support feels warm but can create reliance. Giving and receiving blur together.", upright:"Accept care. Growth through gentleness.", reversed:"Overdependence. Smothering comfort."},
  {id:4,  suit:'major', number:'IV',     symbol:'🏛️', name:'The Pondlord',     altName:'The Emperor',        keywords:'Structure · Authority · Stability · Control',            meaning:"Duckzzy stands firm at the pond's edge. Order is claimed, even if fragile.", upright:"Set boundaries. Lead calmly.", reversed:"Rigid control. Authority without flexibility."},
  {id:5,  suit:'major', number:'V',      symbol:'📜', name:'The Old Quack',    altName:'The Hierophant',     keywords:'Tradition · Belief · Teaching · Habit',                  meaning:"An older Duckzzy repeats what was learned. Answers are inherited, not examined.", upright:"Respect shared wisdom. Learn from established paths.", reversed:"Question outdated beliefs. Breaking from routine."},
  {id:6,  suit:'major', number:'VI',     symbol:'🦆', name:'The Double Quack', altName:'The Lovers',         keywords:'Choice · Duality · Reflection · Conflict',               meaning:"Two Duckzzys face each other. Both options feel equally familiar.", upright:"Choose with honesty. Integration over avoidance.", reversed:"Indecision. Avoiding commitment."},
  {id:7,  suit:'major', number:'VII',    symbol:'🚶', name:'The Waddle',       altName:'The Chariot',        keywords:'Movement · Progress · Persistence · Direction',          meaning:"Duckzzy moves forward slowly. Momentum exists, even without speed.", upright:"Keep going. Progress counts, however small.", reversed:"Stalling. Losing direction."},
  {id:8,  suit:'major', number:'VIII',   symbol:'🪶', name:'The Feather',      altName:'Strength',           keywords:'Calm · Resilience · Patience · Inner power',             meaning:"Duckzzy remains gentle in tension. Strength shows without force.", upright:"Quiet confidence. Emotional steadiness.", reversed:"Suppressed emotion. Self-doubt."},
  {id:9,  suit:'major', number:'IX',     symbol:'⋯',  name:'Meanwhile…',       altName:'The Hermit',         keywords:'Withdrawal · Reflection · Distance · Insight',           meaning:"Duckzzy watches events unfold elsewhere. Distance brings understanding.", upright:"Step back. Reflect privately.", reversed:"Isolation. Avoiding connection."},
  {id:10, suit:'major', number:'X',      symbol:'🎡', name:'Bread Wheel',      altName:'Wheel of Fortune',   keywords:'Chance · Cycles · Randomness · Timing',                  meaning:"Bread spins without control. Outcome depends on timing, not effort.", upright:"Accept change. Ride the cycle.", reversed:"Resisting inevitability. Bad timing."},
  {id:11, suit:'major', number:'XI',     symbol:'⏳', name:'The Line',         altName:'Justice',            keywords:'Fairness · Balance · Waiting · Accountability',          meaning:"Duckzzy waits patiently. Balance is delayed, not denied.", upright:"Act fairly. Accept responsibility.", reversed:"Avoiding consequences. Imbalance."},
  {id:12, suit:'major', number:'XII',    symbol:'🙃', name:'Hung Duck',        altName:'The Hanged Man',     keywords:'Pause · Perspective · Letting go · Suspension',          meaning:"Duckzzy hangs upside down, calm. The world looks different this way.", upright:"Surrender control. See differently.", reversed:"Resistance. Stagnation."},
  {id:13, suit:'major', number:'XIII',   symbol:'🍂', name:'Molting',          altName:'Death',              keywords:'Transformation · Endings · Renewal · Release',           meaning:"Old feathers fall away. Duckzzy remains.", upright:"Necessary change. New phase begins.", reversed:"Clinging to the past. Fear of transition."},
  {id:14, suit:'major', number:'XIV',    symbol:'⚖️', name:'Balance Cup',      altName:'Temperance',         keywords:'Moderation · Balance · Adjustment · Harmony',            meaning:"Two drinks are carefully mixed. Neither extreme is chosen.", upright:"Find middle ground. Gentle alignment.", reversed:"Excess. Imbalance."},
  {id:15, suit:'major', number:'XV',     symbol:'🚬', name:'The Cigarette',    altName:'The Devil',          keywords:'Attachment · Habit · Temptation · Dependency',           meaning:"Duckzzy holds the cigarette casually. The grip is voluntary.", upright:"Notice unhealthy patterns. Acknowledge attachment.", reversed:"Breaking free. Reclaiming control."},
  {id:16, suit:'major', number:'XVI',    symbol:'💦', name:'The Splash',       altName:'The Tower',          keywords:'Disruption · Shock · Collapse · Sudden change',          meaning:"The pond erupts without warning. Stability is interrupted.", upright:"Truth through disruption. Necessary breakdown.", reversed:"Delayed collapse. Avoiding the inevitable."},
  {id:17, suit:'major', number:'XVII',   symbol:'✨', name:'The Breadcrumb',   altName:'The Star',           keywords:'Hope · Simplicity · Faith · Guidance',                   meaning:"One crumb floats in darkness. Small hope is enough.", upright:"Gentle optimism. Trust the quiet light.", reversed:"Loss of faith. Overlooking small hope."},

// ─── helpers ───────────────────────────────────
function getRandom(exclude=[]) {
  const pool = DECK.filter(c=>!exclude.includes(c.id));
  return pool[Math.floor(Math.random()*pool.length)];
}
function getDaily() {
  const d = new Date();
  const seed = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  return DECK[seed % DECK.length];
}
// 50/50 chance of reversed — daily card is always upright
function isReversed() { return Math.random() < 0.5; }

// ─── card builder ──────────────────────────────
function cardHTML(card, label=null, isDaily=false, rev=false) {
  const uid = card.id+'-'+Math.random().toString(36).slice(2,7);
  const revClass = rev ? ' reversed' : '';
  const orientArrow = rev ? '↓' : '↑';
  const orientLabel = rev ? 'Reversed' : 'Upright';
  const orientText  = rev ? card.reversed : card.upright;
  const revStyle    = rev ? ' is-reversed' : '';
  return `
    <div class="card-slot">
      ${label?`<span class="card-label">${label}</span>`:''}
      <div class="card-flip-wrapper">
        <div class="card-inner${revClass}" id="ci-${uid}">
          <div class="card-back">
            <div class="card-back-ring"></div>
            <div class="card-back-ring2"></div>
            <span class="card-back-duck">🦆</span>
          </div>
          <div class="card-face s-${card.suit}">
            <div class="card-top-row">
              <span class="card-number">${card.number}</span>
              <span class="card-suit-icon">${SUIT_ICON[card.suit]}</span>
            </div>
            <div class="card-symbol">${card.symbol}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-keywords">${card.keywords}</div>
            <div class="card-meaning">${card.meaning}</div>
            <div class="card-upright${revStyle}">${orientArrow} ${orientLabel}: ${orientText}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        ${isDaily?`<span class="daily-badge">Today's Card</span>`:''}
        ${rev?`<span class="reversed-badge">Reversed</span>`:''}
      </div>
    </div>`;
}

function shareBtn(cards, revs) {
  const names = cards.map((c,i)=> revs[i] ? c.name+' (Rev.)' : c.name);
  const txt = cards.length===1
    ? `I drew ${names[0]} from The Meanwhile Deck — "${revs[0] ? cards[0].reversed : cards[0].meaning}" 🦆`
    : `My Meanwhile Deck spread: ${names.join(' · ')}. The universe remains ambiguous. 🦆`;
  return `<div class="share-area"><a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}" target="_blank" rel="noopener" class="btn">Share on X ↗</a></div>`;
}

// ─── shuffle ───────────────────────────────────
function showShuffle() {
  document.getElementById('reading-area').innerHTML = `
    <div class="shuffle-wrapper"><div>
      <div class="shuffle-cards">
        <div class="shuffle-card"></div><div class="shuffle-card"></div>
        <div class="shuffle-card"></div><div class="shuffle-card"></div>
        <div class="shuffle-card"></div>
      </div>
      <div class="shuffle-label">Shuffling</div>
    </div></div>`;
}

function flipAll() {
  document.querySelectorAll('.card-inner').forEach((el,i)=>{
    setTimeout(()=>el.classList.add('flipped'), i*180);
  });
}

// ─── draw actions ──────────────────────────────
function drawOne() {
  hideBrowse();
  const c = getRandom();
  const rev = isReversed();
  showShuffle();
  setTimeout(()=>{
    document.getElementById('reading-area').innerHTML = `<div class="cards-container">${cardHTML(c,null,false,rev)}</div>${shareBtn([c],[rev])}`;
    setTimeout(flipAll,60);
  },900);
}

function drawSpread() {
  hideBrowse();
  const used=[], cards=[], revs=[];
  ['Past','Present','Meanwhile'].forEach(lbl=>{
    const c=getRandom(used); used.push(c.id);
    cards.push({card:c,lbl}); revs.push(isReversed());
  });
  showShuffle();
  setTimeout(()=>{
    document.getElementById('reading-area').innerHTML = `<div class="cards-container">${cards.map(({card:c,lbl},i)=>cardHTML(c,lbl,false,revs[i])).join('')}</div>${shareBtn(cards.map(x=>x.card),revs)}`;
    setTimeout(flipAll,60);
  },1000);
}

function drawDaily() {
  hideBrowse();
  const c = getDaily();
  showShuffle();
  setTimeout(()=>{
    document.getElementById('reading-area').innerHTML = `<div class="cards-container">${cardHTML(c,null,true,false)}</div>${shareBtn([c],[false])}`;
    setTimeout(flipAll,60);
  },700);
}

// ─── browse ────────────────────────────────────
let browseOpen=false;

function toggleBrowse() {
  browseOpen=!browseOpen;
  const area=document.getElementById('browse-area');
  const btn=document.getElementById('browse-toggle-btn');
  if(browseOpen) {
    area.classList.add('visible');
    renderBrowse('all');
    btn.textContent='Browse All 78 ↑';
    setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),50);
  } else {
    area.classList.remove('visible');
    btn.textContent='Browse All 78 ↓';
  }
}

function hideBrowse() {
  browseOpen=false;
  document.getElementById('browse-area').classList.remove('visible');
  document.getElementById('browse-toggle-btn').textContent='Browse All 78 ↓';
}

function filterDeck(f,btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowse(f);
}

function renderBrowse(f) {
  const list = f==='all' ? DECK : DECK.filter(c=>c.suit===f);
  document.getElementById('browse-grid').innerHTML = list.map(c=>`
    <div class="browse-card s-${c.suit}" onclick="openModal(${c.id})">
      <div class="bc-num">${c.number}</div>
      <div class="bc-sym">${c.symbol}</div>
      <div class="bc-name">${c.name}</div>
      <div class="bc-kw">${c.keywords.split(' · ')[0]}</div>
    </div>`).join('');
}

// ─── modal ─────────────────────────────────────
function openModal(id) {
  const c=DECK.find(x=>x.id===id); if(!c) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-suit">${SUIT_LABEL[c.suit]}</div>
    <div class="modal-symbol">${c.symbol}</div>
    <div class="modal-name">${c.name}</div>
    <div class="modal-sub">${c.number}${c.altName?' · '+c.altName:''}</div>
    <div class="modal-kw">${c.keywords}</div>
    <div class="modal-hr"></div>
    <div class="modal-meaning">${c.meaning}</div>
    <div class="modal-lbl">Upright</div>
    <div class="modal-ur">${c.upright}</div>
    <div class="modal-lbl">Reversed</div>
    <div class="modal-rv">${c.reversed}</div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e) {
  if(e && e.target!==document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>
