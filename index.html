<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦆 Duckzzy Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1612;
    --muted: #6b6058;
    --accent: #c4783a;
    --accent2: #4a7c6b;
    --card-bg: #fdf8f0;
    --border: #2a2018;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    border-bottom: 2px solid var(--border);
    position: relative;
  }

  .header-duck {
    font-size: 3rem;
    display: block;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-top: 0.5rem;
  }

  .tagline {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* ===== MAIN LAYOUT ===== */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  /* ===== SPREAD SELECTOR ===== */
  .spread-selector {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .spread-btn {
    background: transparent;
    border: 2px solid var(--border);
    padding: 0.6rem 1.2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--dark);
    text-transform: uppercase;
  }

  .spread-btn:hover, .spread-btn.active {
    background: var(--dark);
    color: var(--cream);
  }

  /* ===== QUESTION INPUT ===== */
  .question-area {
    text-align: center;
    margin-bottom: 2rem;
  }

  .question-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: block;
  }

  .question-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    width: min(480px, 100%);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    padding: 0.5rem 0.25rem;
    text-align: center;
    color: var(--dark);
    outline: none;
  }

  .question-input::placeholder { color: var(--muted); opacity: 0.6; }

  /* ===== DRAW BUTTON ===== */
  .draw-section {
    text-align: center;
    margin-bottom: 3rem;
  }

  .draw-btn {
    background: var(--dark);
    color: var(--cream);
    border: none;
    padding: 1rem 3rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .draw-btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 0 var(--border);
  }

  .draw-btn:active { transform: translateY(0); box-shadow: none; }

  /* ===== CARDS DISPLAY ===== */
  .cards-area {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 3rem;
    min-height: 300px;
    align-items: flex-start;
  }

  .card-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .position-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .tarot-card {
    width: 160px;
    background: var(--card-bg);
    border: 2.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    animation: cardReveal 0.5s ease backwards;
    box-shadow: 3px 3px 0 var(--border);
  }

  .tarot-card:hover {
    transform: translateY(-6px);
    box-shadow: 3px 9px 0 var(--border);
  }

  .tarot-card.reversed {
    transform: rotate(180deg);
  }

  .tarot-card.reversed:hover {
    transform: rotate(180deg) translateY(-6px);
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-inner {
    padding: 0.75rem 0.6rem;
  }

  .card-number {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }

  .card-art {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    border: 1.5px solid var(--border);
    margin: 0.5rem 0;
    position: relative;
    overflow: hidden;
  }

  .duck-art {
    font-size: 3.5rem;
    line-height: 1;
    filter: grayscale(0.2);
  }

  /* Muted art background patterns */
  .card-art::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    font-weight: 700;
    line-height: 1.2;
    margin-top: 0.4rem;
  }

  .card-suit {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.15rem;
  }

  .reversed-tag {
    font-size: 0.55rem;
    background: var(--muted);
    color: var(--cream);
    padding: 0.1rem 0.3rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-block;
    margin-top: 0.2rem;
  }

  /* ===== CARD DETAIL MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card-bg);
    border: 2.5px solid var(--border);
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
    box-shadow: 6px 6px 0 var(--border);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .modal-art {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    border: 2px solid var(--border);
    margin: 0 auto 1.5rem;
    font-size: 4rem;
  }

  .modal-number {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.25rem;
    line-height: 1.1;
  }

  .modal-subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.25rem;
    justify-content: center;
  }

  .keyword-tag {
    font-size: 0.65rem;
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-meaning {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 1.25rem;
    color: var(--dark);
  }

  .modal-readings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1rem;
  }

  .reading-block {
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 0.75rem;
  }

  .reading-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
    display: block;
  }

  .reading-text {
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--dark);
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    width: 100%;
  }

  .empty-duck {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty-text {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    font-style: italic;
  }

  /* ===== FOOTER ===== */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ===== DIVIDER ===== */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
    opacity: 0.3;
  }

  /* ===== DECK BROWSER ===== */
  .browse-toggle {
    text-align: center;
    margin-bottom: 2rem;
  }

  .browse-btn {
    background: transparent;
    border: 1px solid var(--muted);
    padding: 0.5rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .browse-btn:hover {
    border-color: var(--dark);
    color: var(--dark);
  }

  .deck-browser {
    display: none;
    margin-top: 1rem;
  }

  .deck-browser.open { display: block; }

  .suit-section { margin-bottom: 2rem; }

  .suit-header {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
  }

  .mini-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 0.75rem;
  }

  .mini-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    padding: 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    box-shadow: 2px 2px 0 var(--border);
  }

  .mini-card:hover {
    transform: translateY(-3px);
    box-shadow: 2px 5px 0 var(--border);
  }

  .mini-duck { font-size: 1.8rem; display: block; margin-bottom: 0.25rem; }

  .mini-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.65rem;
    line-height: 1.2;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--muted); }

  /* ===== AI INTERPRETATION ===== */
  #interpretationBox {
    border: 2px solid var(--border);
    background: var(--card-bg);
    padding: 1.75rem 2rem;
    margin-bottom: 2.5rem;
    box-shadow: 4px 4px 0 var(--border);
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .interpretation-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .interp-duck {
    font-size: 1.5rem;
  }

  .interp-title {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .interpretation-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    line-height: 1.85;
    color: var(--dark);
    white-space: pre-wrap;
  }

  .interp-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .interp-loading {
    color: var(--muted);
    font-size: 0.8rem;
    font-style: normal;
    letter-spacing: 0.1em;
  }

  /* ===== SHARE BAR ===== */
  .share-divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 1.5rem 0 1.25rem;
    opacity: 0.4;
  }

  .share-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .share-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .share-btns {
    display: flex;
    gap: 0.6rem;
  }

  .share-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    padding: 0.45rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: var(--dark);
    transition: all 0.15s;
  }

  .share-btn:hover {
    background: var(--dark);
    color: var(--cream);
  }

  .share-btn-x {
    background: var(--dark);
    color: var(--cream);
  }

  .share-btn-x:hover {
    background: #111;
    border-color: #111;
  }

  .share-btn.copied {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--cream);
  }
</style>
</head>
<body>

<header>
  <span class="header-duck">🦆</span>
  <h1>Duckzzy Tarot</h1>
  <p class="tagline">quiet wisdom · mild confusion · accidental insight</p>
</header>

<div class="container">

  <!-- Spread Selector -->
  <div class="spread-selector">
    <button class="spread-btn active" data-spread="1">Single Card</button>
    <button class="spread-btn" data-spread="3">Past / Present / Meanwhile</button>
    <button class="spread-btn" data-spread="5">The Pond Spread</button>
  </div>

  <!-- Question -->
  <div class="question-area">
    <label class="question-label" for="question">Ask a simple question</label>
    <input class="question-input" id="question" type="text" placeholder="or ask nothing. Duckzzy is watching either way.">
  </div>

  <!-- Draw Button -->
  <div class="draw-section">
    <button class="draw-btn" id="drawBtn">✦ Shuffle & Draw ✦</button>
  </div>

  <!-- Cards Display -->
  <div class="cards-area" id="cardsArea">
    <div class="empty-state">
      <div class="empty-duck">🦆</div>
      <p class="empty-text">Duckzzy waits.<br>Press the button when ready.<br>Or not. That is also fine.</p>
    </div>
  </div>

  <!-- AI Interpretation -->
  <div id="interpretationBox" style="display:none;">
    <div class="interpretation-header">
      <span class="interp-duck">🦆</span>
      <span class="interp-title">Duckzzy Speaks</span>
    </div>
    <div id="interpretationText" class="interpretation-text"></div>
    <div id="shareBar" style="display:none;">
      <div class="share-divider"></div>
      <div class="share-row">
        <span class="share-label">Share this reading</span>
        <div class="share-btns">
          <button class="share-btn" id="copyBtn">
            <span id="copyIcon">⎘</span> Copy
          </button>
          <button class="share-btn share-btn-x" id="tweetBtn">
            𝕏 Post
          </button>
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- Browse Deck -->
  <div class="browse-toggle">
    <button class="browse-btn" id="browseBtn">▾ Browse All 78 Cards</button>
  </div>

  <div class="deck-browser" id="deckBrowser"></div>

</div>

<footer>
  <p>🦆 Duckzzy does not judge your choices. Duckzzy simply watches.</p>
  <p style="margin-top:0.5rem; opacity:0.6;">Sometimes the message is: "Wut?"</p>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>

const SPREAD_CONFIGS = {
  "1": [{ label: "What is happening?" }],
  "3": [{ label: "Past" }, { label: "Present" }, { label: "Meanwhile" }],
  "5": [{ label: "Situation" }, { label: "Thought" }, { label: "Feeling" }, { label: "Action" }, { label: "Acceptance" }]
};

let currentSpread = "1";

// Spread buttons
document.querySelectorAll('.spread-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpread = btn.dataset.spread;
    resetCards();
  });
});

function resetCards() {
  const area = document.getElementById('cardsArea');
  area.innerHTML = `<div class="empty-state">
    <div class="empty-duck">🦆</div>
    <p class="empty-text">Duckzzy waits.<br>Press the button when ready.<br>Or not. That is also fine.</p>
  </div>`;
  document.getElementById('interpretationBox').style.display = 'none';
  document.getElementById('shareBar').style.display = 'none';
  lastReading = null;
}

function drawCards() {
  try {
    const debugEl = document.getElementById('debugBar');
    if (debugEl) debugEl.remove();

    const slots = SPREAD_CONFIGS[currentSpread];
    const drawn = [];
    const shuffled = [...DECK].sort(() => Math.random() - 0.5);
    for (let i = 0; i < slots.length; i++) {
      drawn.push({
        card: shuffled[i],
        reversed: Math.random() < 0.3
      });
    }
    lastReading = null;
    document.getElementById('shareBar').style.display = 'none';
    renderCards(drawn, slots);
    const question = document.getElementById('question').value.trim();
    getAIInterpretation(drawn, slots, question);
  } catch(err) {
    showDebug('drawCards error: ' + err.message);
  }
}

function showDebug(msg) {
  let el = document.getElementById('debugBar');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debugBar';
    el.style.cssText = 'background:#c0392b;color:white;padding:1rem;font-family:monospace;font-size:0.8rem;margin:1rem 0;word-break:break-all;border:2px solid #922b21;';
    document.getElementById('cardsArea').insertAdjacentElement('afterend', el);
  }
  el.textContent = '🦆 Debug: ' + msg;
}

function renderCards(drawn, slots) {
  try {
    const area = document.getElementById('cardsArea');
    area.innerHTML = '';

    drawn.forEach((item, i) => {
      const slot = document.createElement('div');
      slot.className = 'card-slot';
      slot.style.animationDelay = `${i * 0.12}s`;

      const label = document.createElement('div');
      label.className = 'position-label';
      label.textContent = slots[i].label;

      const card = document.createElement('div');
      card.className = 'tarot-card' + (item.reversed ? ' reversed' : '');
      card.style.animationDelay = `${i * 0.15}s`;
      card.innerHTML = buildCardHTML(item.card, item.reversed);
      card.addEventListener('click', () => openModal(item.card, item.reversed));

      slot.appendChild(label);
      slot.appendChild(card);
      area.appendChild(slot);
    });
  } catch(err) {
    showDebug('renderCards error: ' + err.message);
  }
}

function buildCardHTML(card, reversed) {
  return `
    <div class="card-inner">
      <div class="card-number">${card.suit === 'Major Arcana' ? card.number : card.suit}</div>
      <div class="card-art">
        <span class="duck-art">${card.emoji}</span>
      </div>
      <div class="card-name">${card.name}</div>
      ${card.aka ? `<div class="card-suit">${card.aka}</div>` : ''}
      ${reversed ? '<span class="reversed-tag">Reversed</span>' : ''}
    </div>
  `;
}

function openModal(card, reversed) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  content.innerHTML = `
    <div class="modal-art">${card.emoji}</div>
    <div class="modal-number">${card.suit === 'Major Arcana' ? `Major Arcana · ${card.number}` : `${card.suit} · ${card.number}`}</div>
    <div class="modal-name">${card.name}</div>
    <div class="modal-subtitle">${card.aka || ''}${reversed ? ' · Reversed' : ''}</div>
    <div class="modal-keywords">
      ${card.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
    </div>
    <p class="modal-meaning">${card.meaning}</p>
    <div class="modal-readings">
      <div class="reading-block">
        <span class="reading-label">Upright</span>
        <p class="reading-text">${card.upright}</p>
      </div>
      <div class="reading-block">
        <span class="reading-label">Reversed</span>
        <p class="reading-text">${card.reversed}</p>
      </div>
    </div>
  `;

  overlay.classList.add('open');
}

document.getElementById('drawBtn').addEventListener('click', drawCards);

async function getAIInterpretation(drawn, slots, question) {
  const box = document.getElementById('interpretationBox');
  const textEl = document.getElementById('interpretationText');
  box.style.display = 'block';
  textEl.innerHTML = '<span class="interp-loading">🦆 Duckzzy is considering...</span>';

  const cardDescriptions = drawn.map((item, i) => {
    const pos = slots[i].label;
    const card = item.card;
    const orient = item.reversed ? 'Reversed' : 'Upright';
    return `Position: ${pos}\nCard: ${card.name}${card.aka ? ` (${card.aka})` : ''}\nOrientation: ${orient}\nKeywords: ${card.keywords.join(', ')}\nMeaning: ${card.meaning}\n${orient} reading: ${item.reversed ? card.reversed : card.upright}`;
  }).join('\n\n');

  const systemPrompt = `You are Duckzzy — a duck who reads tarot. Your voice is:
- Calm, ironic, deadpan
- Speaks in short, quiet observations
- Does not shout revelations
- Uses simple language, sometimes poetic
- Occasionally says something unexpectedly wise
- Never dramatic or mystical-sounding
- Addresses the querent directly but gently
- May acknowledge confusion as part of the reading
- Max 3-4 short paragraphs. No bullet points. No headers.
- End with one short sentence that lands quietly.`;

  const userMsg = `The querent ${question ? `asked: "${question}"` : 'asked no question — they simply drew cards.'}

Cards drawn:
${cardDescriptions}

Give a reading in Duckzzy's voice. Weave the cards together into one quiet, honest interpretation. Do not list cards one by one — speak about the whole picture.`;

  try {
    const response = await fetch("/.netlify/functions/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }]
      })
    });

    const data = await response.json();
    const fullText = data.content.map(b => b.text || '').join('');

    // Typewriter effect
    textEl.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'interp-cursor';
    textEl.appendChild(cursor);

    function typeNext() {
      if (i < fullText.length) {
        cursor.insertAdjacentText('beforebegin', fullText[i]);
        i++;
        setTimeout(typeNext, 18);
      } else {
        cursor.remove();
        // Save reading state and show share bar
        lastReading = { drawn, slots, question, interpretation: fullText };
        document.getElementById('shareBar').style.display = 'block';
      }
    }
    typeNext();

  } catch (err) {
    textEl.innerHTML = '<span class="interp-loading">🦆 Duckzzy stares into the distance. The pond is quiet. (Reading unavailable.)</span>';
  }
}

// ===== SHARE STATE =====
let lastReading = null;

function buildShareText() {
  if (!lastReading) return '';
  const { drawn, slots, question, interpretation } = lastReading;
  const spreadNames = { "1": "Single Card", "3": "Past / Present / Meanwhile", "5": "The Pond Spread" };

  let text = `🦆 Duckzzy Tarot Reading\n`;
  if (question) text += `\nQuestion: "${question}"\n`;
  text += `Spread: ${spreadNames[currentSpread]}\n`;
  text += `\n`;
  drawn.forEach((item, i) => {
    const orient = item.reversed ? ' (Reversed)' : '';
    text += `${item.card.emoji} ${slots[i].label} — ${item.card.name}${orient}\n`;
  });
  text += `\nDuckzzy says:\n"${interpretation.slice(0, 280)}${interpretation.length > 280 ? '…' : ''}"\n`;
  text += `\n— duckzzy-tarot`;
  return text;
}

function buildTweetText() {
  if (!lastReading) return '';
  const { drawn, slots, question, interpretation } = lastReading;
  let text = `🦆 Duckzzy Tarot\n`;
  if (question) text += `"${question}"\n\n`;
  drawn.forEach((item, i) => {
    text += `${item.card.emoji} ${item.card.name}${item.reversed ? ' (R)' : ''}\n`;
  });
  // Keep tweet under 260 chars, leave room for the quote
  const intro = text;
  const quote = interpretation.slice(0, 200);
  text += `\n"${quote}${interpretation.length > 200 ? '…' : ''}"`;
  return text;
}

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = buildShareText();
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<span>⎘</span> Copy';
      btn.classList.remove('copied');
    }, 2000);
  } catch (e) {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
});

document.getElementById('tweetBtn').addEventListener('click', () => {
  const text = encodeURIComponent(buildTweetText());
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
});

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
});

// ===== DECK BROWSER =====
const browseBtn = document.getElementById('browseBtn');
const deckBrowser = document.getElementById('deckBrowser');

browseBtn.addEventListener('click', () => {
  const isOpen = deckBrowser.classList.toggle('open');
  browseBtn.textContent = isOpen ? '▴ Hide Deck' : '▾ Browse All 78 Cards';
  if (isOpen && deckBrowser.children.length === 0) buildBrowser();
});

function buildBrowser() {
  const suits = [
    { name: "Major Arcana", cards: DECK.filter(c => c.suit === 'Major Arcana') },
    { name: "🥖 Suit of Bread", cards: DECK.filter(c => c.suit === '🥖 Bread') },
    { name: "🚬 Suit of Smoke", cards: DECK.filter(c => c.suit === '🚬 Smoke') },
    { name: "🌊 Suit of Pond", cards: DECK.filter(c => c.suit === '🌊 Pond') },
    { name: "🪶 Suit of Feather", cards: DECK.filter(c => c.suit === '🪶 Feather') },
  ];

  suits.forEach(suit => {
    const section = document.createElement('div');
    section.className = 'suit-section';

    const header = document.createElement('div');
    header.className = 'suit-header';
    header.textContent = suit.name + ` (${suit.cards.length})`;

    const grid = document.createElement('div');
    grid.className = 'mini-cards';

    suit.cards.forEach(card => {
      const mini = document.createElement('div');
      mini.className = 'mini-card';
      mini.innerHTML = `<span class="mini-duck">${card.emoji}</span><div class="mini-name">${card.name}</div>`;
      mini.addEventListener('click', () => openModal(card, false));
      grid.appendChild(mini);
    });

    section.appendChild(header);
    section.appendChild(grid);
    deckBrowser.appendChild(section);
  });
}
</script>
